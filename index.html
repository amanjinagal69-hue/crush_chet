<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhai Chat Web</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
        header { background-color: #075e54; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
        #input-area { background: #e5ddd5; padding: 10px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #ccc; }
        #username { width: 70px; padding: 10px; border: 1px solid #ccc; border-radius: 20px; outline: none; text-align: center; font-weight: bold; }
        #message-input { flex: 1; padding: 10px 15px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        #send-btn { background-color: #00a884; color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-color: #f0f2f5; }
        .message-container { display: flex; flex-direction: column; max-width: 80%; padding: 8px 12px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg-left { background-color: white; align-self: flex-start; }
        .msg-right { background-color: #d9fdd3; align-self: flex-end; }
        .sender-name { font-size: 11px; font-weight: bold; color: #128c7e; margin-bottom: 2px; }
        .msg-text { font-size: 15px; color: #333; word-break: break-word; }
        .msg-time { font-size: 9px; color: #777; align-self: flex-end; margin-top: 4px; }
    </style>
</head>
<body>

    <header>Bhai Chat Web</header>

    <!-- इनपुट एरिया ऊपर कर दिया ताकि मोबाइल पर हमेशा दिखे -->
    <div id="input-area">
        <input type="text" id="username" placeholder="नाम" value="Aman">
        <input type="text" id="message-input" placeholder="मैसेज लिखें..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">भेजें</button>
    </div>

    <div id="chat-box"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyLWkcCdZcYVjQuz-ml0rh_DmBBzj0vmIbLJ4j39tiq8lMceSHzikPX-AgXDi13Hlzt/exec";
        let lastMsgCount = 0;

        async function loadMessages() {
            try {
                let response = await fetch(API_URL);
                let data = await response.json();
                let chatBox = document.getElementById("chat-box");
                let currentUser = document.getElementById("username").value;
                
                chatBox.innerHTML = "";
                
                data.forEach(msg => {
                    let isMe = msg.sender.trim().toLowerCase() === currentUser.trim().toLowerCase();
                    let msgClass = isMe ? "msg-right" : "msg-left";
                    
                    chatBox.innerHTML += `
                        <div class="message-container ${msgClass}">
                            <div class="sender-name">${isMe ? "आप" : msg.sender}</div>
                            <div class="msg-text">${msg.message}</div>
                            <div class="msg-time">${msg.timestamp}</div>
                        </div>
                    `;
                });

                if (data.length > lastMsgCount) {
                    chatBox.scrollTop = chatBox.scrollHeight;
                    if (lastMsgCount !== 0 && Notification.permission === "granted") {
                        let lastMsg = data[data.length - 1];
                        if(lastMsg.sender.trim().toLowerCase() !== currentUser.trim().toLowerCase()) {
                            new Notification(`नया मैसेज: ${lastMsg.sender}`, { body: lastMsg.message });
                        }
                    }
                    lastMsgCount = data.length;
                }
            } catch (e) { console.error(e); }
        }

        async function sendMessage() {
            let sender = document.getElementById("username").value;
            let message = document.getElementById("message-input").value;
            let sendBtn = document.getElementById("send-btn");
            if (!sender || !message) return;
            sendBtn.disabled = true;
            document.getElementById("message-input").value = "";
            try {
                await fetch(`${API_URL}?sender=${encodeURIComponent(sender)}&message=${encodeURIComponent(message)}`, { method: 'POST' });
                loadMessages();
            } catch (e) { console.error(e); } finally { sendBtn.disabled = false; }
        }

        document.getElementById("message-input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") { sendMessage(); }
        });

        window.onload = () => {
            if (Notification.permission !== "granted") { Notification.requestPermission(); }
            loadMessages();
            setInterval(loadMessages, 3000);
        };
    </script>
</body>
</html>
